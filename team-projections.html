<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MLB Team Projections</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #18202a;
      --muted: #647184;
      --line: #d9dee7;
      --accent: #166a72;
      --accent-strong: #0e4e55;
      --good-bg: #e9f7ef;
      --good-text: #126b3c;
      --warn-bg: #fff3d8;
      --warn-text: #7b4c00;
      --bad-bg: #ffeceb;
      --bad-text: #a8322a;
      --shadow: 0 10px 30px rgba(24, 32, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.65rem, 3vw, 2.4rem);
      line-height: 1.05;
    }

    .subhead {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .view-tabs {
      display: inline-flex;
      gap: 4px;
      margin-bottom: 12px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .view-tabs a {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
      text-decoration: none;
    }

    .view-tabs a.active {
      background: var(--accent);
      color: #fff;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      justify-content: flex-end;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    input,
    select,
    button {
      min-height: 40px;
      border-radius: 6px;
      font: inherit;
    }

    input[type="date"],
    select,
    .custom-input {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      padding: 0 11px;
    }

    input[type="file"] {
      width: 1px;
      height: 1px;
      opacity: 0;
      position: absolute;
      pointer-events: none;
    }

    button,
    .file-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0 14px;
      cursor: pointer;
      font-size: 0.92rem;
      font-weight: 750;
      white-space: nowrap;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
    }

    button.primary:hover {
      background: var(--accent-strong);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .file-button,
    button.secondary {
      border-color: var(--line);
      background: var(--panel);
      color: var(--ink);
    }

    .file-button:hover,
    button.secondary:hover {
      border-color: #aeb8c7;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .metric {
      min-height: 82px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: 1.45rem;
      line-height: 1.1;
    }

    .table-shell {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .table-top {
      display: none;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .status {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .status.error {
      color: var(--bad-text);
      font-weight: 700;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 225px);
    }

    table {
      width: 100%;
      min-width: 1320px;
      border-collapse: separate;
      border-spacing: 0;
    }

    th,
    td {
      height: 44px;
      border-bottom: 1px solid #edf0f5;
      padding: 8px 10px;
      text-align: left;
      vertical-align: middle;
      font-size: 0.92rem;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f8fafc;
      color: #394557;
      font-size: 0.74rem;
      font-weight: 850;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th:hover {
      background: #eef3f8;
    }

    th[data-sort-key]::after {
      content: "";
      display: inline-block;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1;
      transform: translateY(-1px);
    }

    th.active.asc::after {
      content: "↑";
      margin-left: 7px;
    }

    th.active.desc::after {
      content: "↓";
      margin-left: 7px;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    tr:hover td {
      background: #fbfcfe;
    }

    tr.roi-highlight td {
      background: #f1faf4;
    }

    tr.roi-highlight td:first-child {
      box-shadow: inset 3px 0 0 #43a66b;
    }

    tr.roi-highlight:hover td {
      background: #e8f6ed;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .team {
      width: 68px;
      min-width: 68px;
      max-width: 68px;
      font-weight: 800;
    }

    .team .abbrev {
      margin-right: 0;
    }

    .abbrev {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 28px;
      margin-right: 8px;
      border-radius: 6px;
      background: #eef5f6;
      color: var(--accent-strong);
      font-weight: 850;
      font-size: 0.8rem;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-width: 44px;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.78rem;
      font-weight: 850;
    }

    .home {
      background: var(--good-bg);
      color: var(--good-text);
    }

    .away {
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .favorite {
      background: var(--good-bg);
      color: var(--good-text);
    }

    .dog {
      background: var(--bad-bg);
      color: var(--bad-text);
    }

    .edge-good {
      background: var(--good-bg);
      color: var(--good-text);
    }

    .edge-bad {
      background: var(--bad-bg);
      color: var(--bad-text);
    }

    .confirmed {
      background: var(--good-bg);
      color: var(--good-text);
    }

    .projected {
      background: #eef3f8;
      color: #4a596c;
    }

    .custom-source {
      background: #e9f7ef;
      color: #126b3c;
    }

    .icon-button {
      min-width: 36px;
      padding: 0 10px;
      border-color: var(--line);
      background: var(--panel);
      color: var(--ink);
    }

    .custom-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(24, 32, 42, 0.36);
    }

    .custom-overlay.open {
      display: flex;
    }

    .custom-dialog {
      width: min(980px, 100%);
      max-height: min(840px, calc(100vh - 40px));
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(24, 32, 42, 0.22);
    }

    .custom-header,
    .custom-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .custom-footer {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      justify-content: flex-end;
    }

    .custom-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
    }

    .custom-body {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 16px;
    }

    .custom-side {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .custom-side h3 {
      margin: 0 0 10px;
      font-size: 0.95rem;
    }

    .custom-row {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .custom-row strong {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 850;
    }

    .custom-input {
      width: 100%;
      min-height: 36px;
      border-radius: 6px;
      font: inherit;
      font-size: 0.88rem;
    }

    .custom-section-label {
      margin: 12px 0 8px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .empty {
      padding: 34px 18px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
      }

      header,
      .table-top {
        grid-template-columns: 1fr;
      }

      .controls {
        justify-content: stretch;
      }

      .controls > *,
      .controls button,
      .file-button,
      input[type="date"] {
        width: 100%;
      }

      .toolbar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .custom-body {
        grid-template-columns: 1fr;
      }

      .table-wrap {
        max-height: none;
      }
    }

    @media (max-width: 520px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .view-tabs {
        width: 100%;
      }

      .view-tabs a {
        flex: 1;
        justify-content: center;
      }
    }
    /* Night-game broadcast theme */
    :root {
      color-scheme: dark;
      --bg: #080b0d;
      --panel: #111619;
      --ink: #f3f6ef;
      --muted: #89958f;
      --line: #28312d;
      --accent: #c9ff3d;
      --accent-strong: #a9dc24;
      --good-bg: #203919;
      --good-text: #c9ff3d;
      --warn-bg: #422b17;
      --warn-text: #ffad5c;
      --bad-bg: #402020;
      --bad-text: #ff7c70;
      --shadow: 0 18px 55px rgba(0, 0, 0, .32);
    }
    body {
      background:
        radial-gradient(circle at 83% 0%, rgba(201,255,61,.09), transparent 25rem),
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        var(--bg);
      background-size: auto, 100% 48px, auto;
      font-family: "Arial Narrow", "Roboto Condensed", Inter, ui-sans-serif, system-ui, sans-serif;
    }
    body::before { content: ""; position: fixed; inset: 0 0 auto; height: 3px; background: linear-gradient(90deg, var(--accent) 0 68%, #ff7b32 68%); z-index: 20; }
    main { width: min(1420px, calc(100% - 48px)); padding-top: 24px; }
    .brand-bar { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 42px; }
    .view-tabs { margin: 0; padding: 0; gap: 3px; border: 0; border-radius: 0; background: transparent; }
    .view-tabs a { min-height: 38px; padding: 0 17px; border: 1px solid transparent; border-radius: 2px; letter-spacing: .08em; text-transform: uppercase; }
    .view-tabs a:hover { color: var(--ink); }
    .view-tabs a.active { border-color: var(--line); background: #1b211f; color: var(--accent); box-shadow: inset 0 -2px var(--accent); }
    header { align-items: end; margin-bottom: 26px; }
    h1 { max-width: 720px; margin-bottom: 9px; font-size: clamp(2.5rem, 5vw, 5.1rem); font-weight: 900; letter-spacing: -.055em; line-height: .87; text-transform: uppercase; }
    .subhead { max-width: 560px; line-height: 1.55; }
    label { letter-spacing: .12em; }
    input, select, button, .file-button { border-radius: 2px; }
    input[type="date"], select, .custom-input { border-color: var(--line); background: #0d1113; }
    button.primary { background: var(--accent); color: #0a0d0b; text-transform: uppercase; letter-spacing: .06em; box-shadow: 4px 4px 0 #354019; }
    button.primary:hover { background: #ddff78; transform: translate(-1px,-1px); box-shadow: 5px 5px 0 #354019; }
    button.secondary, .file-button, .icon-button { border-color: var(--line); background: #171c1a; color: var(--ink); }
    .toolbar { gap: 2px; margin-bottom: 18px; }
    .metric { position: relative; min-height: 112px; border: 0; border-top: 1px solid var(--line); border-radius: 0; background: linear-gradient(135deg, #151b18, #101513); padding: 20px; box-shadow: none; overflow: hidden; }
    .metric::after { content: attr(data-index); position: absolute; right: 12px; bottom: -15px; color: rgba(255,255,255,.025); font-size: 5rem; font-weight: 900; }
    .metric:first-child { border-top-color: var(--accent); }
    .metric span { letter-spacing: .14em; }
    .metric strong { margin-top: 11px; color: var(--ink); font-size: 2rem; }
    .table-shell { border-color: var(--line); border-radius: 0; background: var(--panel); }
    th, td { height: 47px; border-bottom-color: #202824; }
    th { background: #181e1b; color: #a8b2ac; letter-spacing: .08em; }
    th:hover { background: #202820; color: var(--accent); }
    tr:hover td { background: #171d1a; }
    tr.roi-highlight td { background: #152014; }
    tr.roi-highlight td:first-child { box-shadow: inset 3px 0 var(--accent); }
    tr.roi-highlight:hover td { background: #1a2a17; }
    .abbrev { border: 1px solid #344039; border-radius: 2px; background: #1a211e; color: var(--accent); letter-spacing: .08em; }
    .team-logo { display:inline-grid; place-items:center; width:42px; height:34px; margin-right:8px; vertical-align:middle; }
    .team-logo img { width:30px; height:30px; object-fit:contain; filter:drop-shadow(0 2px 4px rgba(0,0,0,.45)); }
    .team-logo .logo-fallback { display:none; color:var(--accent); font-size:.72rem; font-weight:900; letter-spacing:.06em; }
    .team .team-logo { margin-right:0; }
    .chip { border-radius: 2px; }
    .projected { background: #222927; color: #b1bbb5; }
    .custom-source { background: var(--good-bg); color: var(--good-text); }
    .custom-overlay { background: rgba(2,4,3,.82); backdrop-filter: blur(8px); }
    .custom-dialog, .custom-side { border-radius: 2px; }
    @media (max-width: 820px) { main { width: min(100% - 20px, 1420px); } .brand-bar { margin-bottom: 28px; } }
  </style>
</head>
<body>
  <main>
    <div class="brand-bar">
      <nav class="view-tabs" aria-label="Projection pages">
        <a href="/" class="active" aria-current="page">Teams</a>
        <a href="/player-projections.html">Players</a>
      </nav>
    </div>

    <header>
      <div>
        <h1>Team<br>Projections</h1>
      </div>
      <div class="controls" aria-label="Projection controls">
        <label>
          Date
          <input id="dateInput" type="date">
        </label>
        <label title="FanGraphs projection system used to run the simulations">
          Projection
          <select id="projectionSystemSelect">
            <option value="rSteamer" selected>rSteamer</option>
            <option value="rSteamerPN">rSteamerPN</option>
            <option value="Steamer">Steamer</option>
            <option value="ZiPS">ZiPS</option>
          </select>
        </label>
        <button id="refreshButton" class="primary" type="button" title="Refresh projections for the selected date">
          Refresh
        </button>
      </div>
    </header>

    <section class="toolbar" aria-label="Slate summary">
      <div class="metric">
        <span>Teams</span>
        <strong id="teamsMetric">0</strong>
      </div>
      <div class="metric">
        <span>Games</span>
        <strong id="gamesMetric">0</strong>
      </div>
      <div class="metric">
        <span>Top Runs</span>
        <strong id="runsMetric">--</strong>
      </div>
      <div class="metric">
        <span>Top ROI</span>
        <strong id="topRoiMetric">--</strong>
      </div>
    </section>

    <section class="table-shell">
      <div class="table-top">
        <div id="status" class="status">Choose a date and refresh projections.</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-sort-key="gameTime">Time</th>
              <th data-sort-key="teamName">Team</th>
              <th data-sort-key="side">Side</th>
              <th data-sort-key="lineupSource">Lineup</th>
              <th data-sort-key="opponentName">Opponent</th>
              <th data-sort-key="startingPitcher">Starter</th>
              <th data-sort-key="opposingPitcher">Opposing Pitcher</th>
              <th class="num" data-sort-key="expectedRoi">ROI</th>
              <th class="num" data-sort-key="projectedRuns">Proj Runs</th>
              <th class="num" data-sort-key="moneyline">FG Fair ML</th>
              <th class="num" data-sort-key="marketMoneyline">ESPN ML</th>
              <th class="num" data-sort-key="projectedTotalRuns">Game Total</th>
              <th data-sort-key="projectionSystem">Projection</th>
              <th>Custom</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td class="empty" colspan="14">No projections loaded yet.</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <div id="customOverlay" class="custom-overlay" aria-hidden="true">
      <div class="custom-dialog" role="dialog" aria-modal="true" aria-labelledby="customTitle">
        <div class="custom-header">
          <h2 id="customTitle" class="custom-title">Custom Projection</h2>
          <button id="customCloseButton" class="icon-button" type="button" title="Close">x</button>
        </div>
        <div id="customBody" class="custom-body"></div>
        <div class="custom-footer">
          <button id="customCancelButton" class="secondary" type="button">Cancel</button>
          <button id="customRunButton" class="primary" type="button">Run Custom</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const state = {
      rows: [],
      filteredRows: [],
      sortKey: "expectedRoi",
      sortDirection: "desc",
      refreshedAt: "",
      cache: null,
      gamesByKey: new Map(),
      activeCustomGame: null,
    };

    // Relative /api URLs only resolve when the page is served by the dev
    // server; opened from file:// or an app preview pane, fall back to it.
    const API_BASE = /^https?:$/.test(window.location.protocol) ? "" : "http://localhost:8000";

    const dateInput = document.querySelector("#dateInput");
    const projectionSystemSelect = document.querySelector("#projectionSystemSelect");
    const refreshButton = document.querySelector("#refreshButton");
    const statusEl = document.querySelector("#status");
    const tableBody = document.querySelector("#tableBody");
    const teamsMetric = document.querySelector("#teamsMetric");
    const gamesMetric = document.querySelector("#gamesMetric");
    const runsMetric = document.querySelector("#runsMetric");
    const topRoiMetric = document.querySelector("#topRoiMetric");
    const headers = [...document.querySelectorAll("th[data-sort-key]")];
    const customOverlay = document.querySelector("#customOverlay");
    const customTitle = document.querySelector("#customTitle");
    const customBody = document.querySelector("#customBody");
    const customCloseButton = document.querySelector("#customCloseButton");
    const customCancelButton = document.querySelector("#customCancelButton");
    const customRunButton = document.querySelector("#customRunButton");

    dateInput.value = localDateString(new Date());

    refreshButton.addEventListener("click", () => {
      refreshProjections(dateInput.value);
    });

    customCloseButton.addEventListener("click", closeCustomEditor);
    customCancelButton.addEventListener("click", closeCustomEditor);
    customRunButton.addEventListener("click", runCustomProjection);
    customOverlay.addEventListener("click", (event) => {
      if (event.target === customOverlay) closeCustomEditor();
    });

    headers.forEach((header) => {
      header.addEventListener("click", () => {
        const key = header.dataset.sortKey;
        if (state.sortKey === key) {
          state.sortDirection = state.sortDirection === "asc" ? "desc" : "asc";
        } else {
          state.sortKey = key;
          state.sortDirection = defaultDirection(key);
        }
        applyFilterAndSort();
        renderTable();
      });
    });

    async function refreshProjections(date) {
      if (!date) {
        setStatus("Pick a date first.", true);
        return;
      }

      setBusy(true);
      setStatus(`Refreshing ${date}...`);

      try {
        const result = await refreshRequest(date);
        applyProjectionRows(result);
      } catch (error) {
        setStatus(`Could not refresh projections. ${formatError(error)}`, true);
      } finally {
        setBusy(false);
      }
    }

    async function refreshRequest(date) {
      const response = await fetch(`${API_BASE}/api/refresh-projections`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ date, lineType: "current", projectionSystem: projectionSystemSelect.value }),
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(result.error || `HTTP ${response.status}`);
      }
      return result;
    }

    function applyProjectionRows(result) {
      const teamRows = Array.isArray(result.rows) ? result.rows : [];

      state.rows = teamRows;
      state.refreshedAt = result.refreshedAt || "";
      state.cache = result.cache || null;
      state.gamesByKey = indexGames(result.games || []);
      state.activeCustomGame = null;
      applyFilterAndSort();
      renderMetrics();
      renderTable();

      if (!teamRows.length) {
        setStatus(`No projection rows were found for ${result.date || dateInput.value}.`, true);
        return;
      }

      const gameCount = new Set(teamRows.map((row) => row.gameKey)).size;
      const oddsCount = teamRows.filter((row) => typeof row.marketMoneyline === "number").length;
      const errorCount = teamRows.filter((row) => row.error || row.oddsError).length;
      setStatus(`Loaded ${teamRows.length} teams from ${gameCount} games with odds for ${oddsCount} team rows${errorCount ? `; ${errorCount} rows have notes` : ""}. ${cacheSummary(result.cache)}`);
    }

    function applyFilterAndSort() {
      state.filteredRows = [...state.rows].sort(compareRows);

      updateHeaderState();
    }

    function compareRows(a, b) {
      const direction = state.sortDirection === "asc" ? 1 : -1;
      const aValue = a[state.sortKey];
      const bValue = b[state.sortKey];
      const aMissing = aValue == null || aValue === "";
      const bMissing = bValue == null || bValue === "";

      if (aMissing && bMissing) return a.teamName.localeCompare(b.teamName);
      if (aMissing) return 1;
      if (bMissing) return -1;

      if (typeof aValue === "number" && typeof bValue === "number") {
        return (aValue - bValue) * direction || a.teamName.localeCompare(b.teamName);
      }

      return String(aValue).localeCompare(String(bValue), undefined, { numeric: true }) * direction;
    }

    function renderTable() {
      if (!state.filteredRows.length) {
        tableBody.innerHTML = `<tr><td class="empty" colspan="14">${state.rows.length ? "No teams match that filter." : "No projections loaded yet."}</td></tr>`;
        return;
      }

      tableBody.innerHTML = state.filteredRows.map((row) => `
        <tr class="${typeof row.expectedRoi === "number" && row.expectedRoi > 0.05 ? "roi-highlight" : ""}">
          <td>${escapeHtml(row.displayTime)}</td>
          <td class="team">${teamLogo(row.teamAbbrev)}</td>
          <td><span class="chip ${row.side === "Home" ? "home" : "away"}">${row.side}</span></td>
          <td><span class="chip ${lineupClass(row.lineupSource)}">${formatLineupSource(row.lineupSource)}</span></td>
          <td>${teamLogo(row.opponentAbbrev)}</td>
          <td>${escapeHtml(row.startingPitcher || "--")}</td>
          <td>${escapeHtml(row.opposingPitcher || "--")}</td>
          <td class="num">${formatSignedPct(row.expectedRoi)}</td>
          <td class="num">${formatNumber(row.projectedRuns, 2)}</td>
          <td class="num"><span class="chip ${moneylineClass(row.moneyline)}">${formatMoneyline(row.moneyline)}</span></td>
          <td class="num"><span class="chip ${moneylineClass(row.marketMoneyline)}">${formatMoneyline(row.marketMoneyline)}</span></td>
          <td class="num">${formatNumber(row.projectedTotalRuns, 2)}</td>
          <td>${escapeHtml(row.projectionSystem)}</td>
          <td><button class="icon-button" type="button" data-custom-game="${escapeHtml(row.gameKey)}" title="Edit lineup and starter">Custom</button></td>
        </tr>
      `).join("");

      tableBody.querySelectorAll("[data-custom-game]").forEach((button) => {
        button.addEventListener("click", () => openCustomEditor(button.dataset.customGame));
      });
    }

    async function openCustomEditor(gameKey) {
      const game = state.gamesByKey.get(String(gameKey));
      if (!game?.customInput) {
        setStatus("Custom inputs are unavailable for that game until the FanGraphs sim loads.", true);
        return;
      }

      state.activeCustomGame = clone(game.customInput);
      customTitle.textContent = `${state.activeCustomGame.awayTeamAbbrev} @ ${state.activeCustomGame.homeTeamAbbrev}`;
      customOverlay.classList.add("open");
      customOverlay.setAttribute("aria-hidden", "false");
      customBody.innerHTML = `<div class="empty">Loading active rosters...</div>`;
      customRunButton.disabled = true;

      try {
        const [awayRoster, homeRoster] = await Promise.all([
          teamRosterRequest(state.activeCustomGame.awayTeamAbbrev),
          teamRosterRequest(state.activeCustomGame.homeTeamAbbrev),
        ]);
        if (!state.activeCustomGame) return;
        state.activeCustomGame.rosters = { away: awayRoster, home: homeRoster };
        renderCustomEditor();
        customRunButton.disabled = false;
      } catch (error) {
        customBody.innerHTML = `<div class="empty">Could not load active rosters. ${escapeHtml(formatError(error))}</div>`;
        setStatus(`Could not load active rosters. ${formatError(error)}`, true);
      }
    }

    async function teamRosterRequest(teamAbbrev) {
      const response = await fetch(`${API_BASE}/api/team-roster?team=${encodeURIComponent(teamAbbrev)}`);
      const result = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(result.error || `HTTP ${response.status}`);
      return result;
    }

    function closeCustomEditor() {
      state.activeCustomGame = null;
      customOverlay.classList.remove("open");
      customOverlay.setAttribute("aria-hidden", "true");
      customBody.innerHTML = "";
    }

    function renderCustomEditor() {
      const game = state.activeCustomGame;
      if (!game) return;

      customBody.innerHTML = `
        ${customSideHtml("away", game)}
        ${customSideHtml("home", game)}
      `;
    }

    function customSideHtml(side, game) {
      const lineup = game[side] || {};
      const teamName = side === "away" ? game.awayTeamName : game.homeTeamName;
      const teamAbbrev = side === "away" ? game.awayTeamAbbrev : game.homeTeamAbbrev;
      const battingOrder = padBattingOrder(lineup.battingOrder || []);
      const roster = game.rosters?.[side] || { batters: [], pitchers: [] };

      return `
        <section class="custom-side" data-side="${side}">
          <h3>${escapeHtml(teamAbbrev || teamName)}</h3>
          <div class="custom-section-label">Batting Order</div>
          ${battingOrder.map((slot, index) => `
            <label class="custom-row">
              <strong>${index + 1}. ${escapeHtml(slot.position || "")}</strong>
              <select class="custom-input" data-custom-field="batter" data-side="${side}" data-index="${index}">
                ${rosterOptions(roster.batters, slot.playerId, "Select active player")}
              </select>
            </label>
          `).join("")}
          <div class="custom-section-label">Starter</div>
          <label class="custom-row">
            <strong>SP</strong>
            <select class="custom-input" data-custom-field="starter" data-side="${side}">
              ${rosterOptions(roster.pitchers, lineup.startingPitcher, "Select active pitcher")}
            </select>
          </label>
        </section>
      `;
    }

    function rosterOptions(players, selectedId, placeholder) {
      return `<option value="">${escapeHtml(placeholder)}</option>` + players
        .sort((a, b) => String(a.name).localeCompare(String(b.name)))
        .map((player) => {
          const selected = String(player.playerId) === String(selectedId) ? " selected" : "";
          return `<option value="${escapeHtml(player.playerId)}"${selected}>${escapeHtml(player.name)} (${escapeHtml(player.position)})</option>`;
        })
        .join("");
    }

    async function runCustomProjection() {
      const game = state.activeCustomGame;
      if (!game) return;

      try {
        customRunButton.disabled = true;
        customRunButton.textContent = "Running...";
        readCustomEditorIntoGame(game);
        validateCustomLineups(game);
        const payload = buildCustomPayload(game);
        const result = await customProjectionRequest(game, payload);
        applyCustomProjectionRows(result);
        closeCustomEditor();
      } catch (error) {
        setStatus(`Could not run custom projection. ${formatError(error)}`, true);
      } finally {
        customRunButton.disabled = false;
        customRunButton.textContent = "Run Custom";
      }
    }

    function readCustomEditorIntoGame(game) {
      customBody.querySelectorAll("[data-custom-field='batter']").forEach((input) => {
        const side = input.dataset.side;
        const index = Number(input.dataset.index);
        const lineup = game[side];
        if (!lineup?.battingOrder?.[index]) return;
        lineup.battingOrder[index].playerId = input.value;
      });

      customBody.querySelectorAll("[data-custom-field='starter']").forEach((input) => {
        const side = input.dataset.side;
        const lineup = game[side];
        if (!lineup) return;
        lineup.startingPitcher = input.value;
      });
    }

    function validateCustomLineups(game) {
      for (const side of ["away", "home"]) {
        const team = side === "away" ? game.awayTeamAbbrev : game.homeTeamAbbrev;
        const ids = padBattingOrder(game[side]?.battingOrder || []).map((slot) => slot.playerId).filter(Boolean);
        if (ids.length !== 9) throw new Error(`${team} needs nine hitters.`);
        if (new Set(ids).size !== 9) throw new Error(`${team} cannot use the same hitter twice.`);
        if (!game[side]?.startingPitcher) throw new Error(`${team} needs a starting pitcher.`);
      }
    }

    function buildCustomPayload(game) {
      return {
        homeTeamId: game.homeTeamId,
        awayTeamId: game.awayTeamId,
        projectionSystem: game.projectionSystem || "rSteamer",
        playerIdType: "upid",
        extraInningsGhostRunner: true,
        forceCompleteGame: false,
        threeBatterMinimum: true,
        hfa: { enabled: false },
        home: customPayloadLineup(game.home),
        away: customPayloadLineup(game.away),
      };
    }

    function customPayloadLineup(lineup) {
      const payload = {
        battingOrder: padBattingOrder(lineup.battingOrder || []).map((slot) => ({
          position: slot.position || "",
          playerId: slot.playerId || "",
        })),
        bullpen: (lineup.bullpen || []).map((pitcher) => ({
          role: pitcher.role || "Middle Reliever",
          playerId: pitcher.playerId || "",
        })),
      };

      if (lineup.lineupSource) payload.lineupSource = lineup.lineupSource;
      if (lineup.startingPitcher) payload.startingPitcher = { playerId: lineup.startingPitcher };
      if (lineup.opener) payload.opener = { playerId: lineup.opener };
      return payload;
    }

    async function customProjectionRequest(game, payload) {
      const response = await fetch(`${API_BASE}/api/run-custom-projection`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          date: game.date,
          gameKey: game.gameKey,
          lineType: "current",
          payload,
        }),
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(result.error || `HTTP ${response.status}`);
      }
      return result;
    }

    function applyCustomProjectionRows(result) {
      const rows = Array.isArray(result.rows) ? result.rows : [];
      if (!rows.length) {
        setStatus("FanGraphs returned the custom sim, but no team rows were found.", true);
        return;
      }

      const gameKey = rows[0].gameKey;
      state.rows = state.rows.map((row) => (row.gameKey === gameKey ? rows.find((customRow) => customRow.side === row.side) || row : row));
      if (result.game?.customInput) {
        state.gamesByKey.set(String(gameKey), result.game);
      }
      applyFilterAndSort();
      renderMetrics();
      renderTable();
      setStatus(`Loaded custom projection for ${rows.map((row) => row.teamAbbrev).join(" @ ")}.`);
    }

    function indexGames(games) {
      const index = new Map();
      for (const game of games) {
        const key = game.mlbGameId || game.gameId || game.customInput?.gameKey;
        if (key) index.set(String(key), game);
      }
      return index;
    }

    function resolvePlayerId(value, game) {
      const trimmed = String(value || "").trim();
      if (!trimmed) return "";
      const players = game.players?.all || [];
      const bracketMatch = trimmed.match(/\[([^\]]+)\]\s*$/);
      if (bracketMatch) return bracketMatch[1].trim();
      const exactId = players.find((player) => String(player.playerId) === trimmed);
      if (exactId) return exactId.playerId;
      const exactName = players.find((player) => String(player.name || "").toLowerCase() === trimmed.toLowerCase());
      return exactName?.playerId || trimmed;
    }

    function playerDisplayValue(player) {
      if (!player?.playerId) return "";
      return player.name ? `${player.name} [${player.playerId}]` : String(player.playerId);
    }

    function padBattingOrder(order) {
      const positions = ["CF", "SS", "RF", "1B", "DH", "3B", "C", "LF", "2B"];
      return Array.from({ length: 9 }, (_, index) => ({
        position: order[index]?.position || positions[index],
        playerId: order[index]?.playerId || "",
        name: order[index]?.name || "",
      }));
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function renderMetrics() {
      const teams = state.rows.length;
      const gameCount = new Set(state.rows.map((row) => row.gameKey)).size;
      const topRuns = [...state.rows].sort((a, b) => (b.projectedRuns ?? -Infinity) - (a.projectedRuns ?? -Infinity))[0];
      const topRoi = state.rows
        .filter((row) => typeof row.expectedRoi === "number")
        .sort((a, b) => b.expectedRoi - a.expectedRoi)[0];

      teamsMetric.textContent = String(teams);
      gamesMetric.textContent = String(gameCount);
      runsMetric.textContent = topRuns ? `${topRuns.teamAbbrev || topRuns.teamName} ${formatNumber(topRuns.projectedRuns, 2)}` : "--";
      topRoiMetric.textContent = topRoi ? `${topRoi.teamAbbrev || topRoi.teamName} ${formatSignedPct(topRoi.expectedRoi)}` : "--";
    }

    function updateHeaderState() {
      headers.forEach((header) => {
        const active = header.dataset.sortKey === state.sortKey;
        header.classList.toggle("active", active);
        header.classList.toggle("asc", active && state.sortDirection === "asc");
        header.classList.toggle("desc", active && state.sortDirection === "desc");
      });
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function setBusy(isBusy) {
      refreshButton.disabled = isBusy;
      refreshButton.textContent = isBusy ? "Refreshing..." : "Refresh";
    }

    function defaultDirection(key) {
      return ["teamName", "opponentName", "side", "lineupSource", "startingPitcher", "projectionSystem", "gameTime"].includes(key) ? "asc" : "desc";
    }

    function formatNumber(value, digits) {
      return typeof value === "number" ? value.toFixed(digits) : "--";
    }

    function formatPct(value) {
      return typeof value === "number" ? `${(value * 100).toFixed(1)}%` : "--";
    }

    function formatSignedPct(value) {
      if (typeof value !== "number") return "--";
      const percent = value * 100;
      return `${percent > 0 ? "+" : ""}${percent.toFixed(1)}%`;
    }

    function formatMoneyline(value) {
      if (typeof value !== "number") return "--";
      return value > 0 ? `+${value}` : String(value);
    }

    function moneylineClass(value) {
      if (typeof value !== "number") return "";
      return value < 0 ? "favorite" : "dog";
    }

    function edgeClass(value) {
      if (typeof value !== "number") return "";
      return value >= 0 ? "edge-good" : "edge-bad";
    }

    function lineupClass(value) {
      const normalized = String(value || "").toLowerCase();
      if (normalized === "confirmed") return "confirmed";
      if (normalized === "projected") return "projected";
      if (normalized === "custom") return "custom-source";
      return "";
    }

    function formatLineupSource(value) {
      if (!value) return "--";
      return `${String(value).charAt(0).toUpperCase()}${String(value).slice(1)}`;
    }

    function localDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    const MLB_TEAM_IDS = { ARI:109, AZ:109, ATL:144, BAL:110, BOS:111, CHC:112, CHW:145, CWS:145, CIN:113, CLE:114, COL:115, DET:116, HOU:117, KC:118, KCR:118, LAA:108, LAD:119, MIA:146, MIL:158, MIN:142, NYM:121, NYY:147, ATH:133, OAK:133, PHI:143, PIT:134, SD:135, SDP:135, SEA:136, SF:137, SFG:137, STL:138, TB:139, TBR:139, TEX:140, TOR:141, WSH:120, WAS:120 };

    function teamLogo(abbrev) {
      const label = String(abbrev || "--").toUpperCase();
      const teamId = MLB_TEAM_IDS[label];
      if (!teamId) return `<span class="abbrev">${escapeHtml(label)}</span>`;
      return `<span class="team-logo" title="${escapeHtml(label)}"><img src="https://www.mlbstatic.com/team-logos/team-cap-on-dark/${teamId}.svg" alt="${escapeHtml(label)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"><span class="logo-fallback">${escapeHtml(label)}</span></span>`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      })[char]);
    }

    function formatError(error) {
      return error instanceof Error ? error.message : String(error);
    }

    function cacheSummary(cache) {
      if (!cache) return "";
      const simHits = Number(cache.simsHit || 0);
      const simMisses = Number(cache.simsMiss || 0);
      return `Cache: sims ${simHits} hit/${simMisses} new.`;
    }

    updateHeaderState();
  </script>
</body>
</html>
